name: CD - Build and Push Docker Images
on:
  workflow_run:
    workflows: ["CI - Test Backend"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-backend:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version tag
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./simple-api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:${{ github.sha }}
          push: true

  build-and-push-database:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version tag
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:${{ github.sha}}
          push: true

  build-and-push-httpd:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version tag
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:${{ github.sha }}
          push: true

  build-and-push-frontend:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version tag
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-frontend:${{ github.sha }}
          push: true

  build-ansible-image:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build and push Ansible image
        uses: docker/build-push-action@v6
        with:
          context: ./ansible
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-ansible:latest
          push: true

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_TOKEN }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

      - name: Create inventory file
        run: |
          echo "all:" > ansible/inventories/setup.yml
          echo "  vars:" >> ansible/inventories/setup.yml
          echo "    ansible_user: admin" >> ansible/inventories/setup.yml
          echo "    ansible_ssh_private_key_file: /root/.ssh/id_rsa" >> ansible/inventories/setup.yml
          echo "  children:" >> ansible/inventories/setup.yml
          echo "    prod:" >> ansible/inventories/setup.yml
          echo "      hosts:" >> ansible/inventories/setup.yml
          echo "        ${{ secrets.ANSIBLE_HOST }}:" >> ansible/inventories/setup.yml

      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_password

      - name: Deploy with Ansible via Docker
        run: |
          docker run --rm \
            -v ~/.ssh:/root/.ssh:ro \
            -v $(pwd)/ansible:/ansible \
            -v $(pwd)/.vault_password:/ansible/.vault_password:ro \
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-ansible:latest \
            -i /ansible/inventories/setup.yml \
            /ansible/playbook.yml \
            --vault-password-file /ansible/.vault_password
