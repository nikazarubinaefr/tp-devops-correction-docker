name: CD - Deploy
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_TOKEN }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

      - name: Create inventory file
        run: |
          echo "all:" > ansible/inventories/setup.yml
          echo "  vars:" >> ansible/inventories/setup.yml
          echo "    ansible_user: admin" >> ansible/inventories/setup.yml
          echo "    ansible_ssh_private_key_file: /root/.ssh/id_rsa" >> ansible/inventories/setup.yml
          echo "  children:" >> ansible/inventories/setup.yml
          echo "    prod:" >> ansible/inventories/setup.yml
          echo "      hosts:" >> ansible/inventories/setup.yml
          echo "        ${{ secrets.ANSIBLE_HOST }}:" >> ansible/inventories/setup.yml

      - name: Create vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_password

      - name: Deploy with Ansible via Docker
        run: |
          docker run --rm \
            -v ~/.ssh:/root/.ssh:ro \
            -v $(pwd)/ansible:/ansible \
            -v $(pwd)/.vault_password:/ansible/.vault_password:ro \
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-ansible:latest \
            -i /ansible/inventories/setup.yml \
            /ansible/playbook.yml \
            --vault-password-file /ansible/.vault_password
